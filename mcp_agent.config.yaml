$schema: https://raw.githubusercontent.com/lastmile-ai/mcp-agent/refs/heads/main/schema/mcp-agent.config.schema.json

name: mcp_raven
execution_engine: asyncio

logger:
  transports: [console, file]
  level: info
  path: logs/mcp-raven.log

# Any OpenAI-compatible provider works (OpenAI, OpenRouter, Ollama, LM Studio)
openai:
  base_url: https://openrouter.ai/api/v1
  default_model: qwen/qwen-turbo
